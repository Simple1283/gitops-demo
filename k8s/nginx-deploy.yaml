apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
      - name: nginx
        image: ghcr.io/simple1283/gitops-nginx:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 80
